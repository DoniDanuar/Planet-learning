<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Menu</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background: radial-gradient(circle at top, #1a237e, #0b0f2f);
      color: white;
      overflow: hidden;
    }

    /* Bintang */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 0;
    }

    .stars::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      box-shadow: 100px 200px white, 300px 400px white, 500px 100px white,
                  700px 300px white, 900px 150px white, 1200px 350px white;
      animation: blink 2s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .user {
      margin-bottom: 20px;
      font-size: 1.2rem;
      color: #ffeb3b;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.2);
    }

    .card h3 {
      margin: 10px 0;
    }

    .icon {
      font-size: 2rem;
    }

    .input-name {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 20px;
      border: none;
      width: 200px;
      text-align: center;
    }

    button {
      margin-left: 10px;
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #ff9800;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ffc107;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="container">
    <h1>🚀 Menu Utama</h1>

    <div class="input-name">
      <input type="text" id="namaInput" placeholder="Masukkan Nama">
      <button onclick="simpanNama()">Mulai</button>
    </div>

    <div class="user" id="user"></div>

    <div class="menu">

      <div class="card" onclick="go('planet.html')">
        <div class="icon">🌍</div>
        <h3>Belajar Planet</h3>
      </div>

      <div class="card" onclick="go('game.html')">
        <div class="icon">🎮</div>
        <h3>Game</h3>
      </div>

      <div class="card" onclick="go('quiz.html')">
        <div class="icon">📝</div>
        <h3>Quiz</h3>
      </div>

      <div class="card" onclick="go('petunjuk.html')">
        <div class="icon">📖</div>
        <h3>Petunjuk</h3>
      </div>

      <div class="card" onclick="go('tentang.html')">
        <div class="icon">ℹ</div>
        <h3>Tentang</h3>
      </div>

      <div class="card" onclick="go('referensi.html')">
        <div class="icon">📚</div>
        <h3>Referensi</h3>
      </div>

    </div>
  </div>

  <script>
    function simpanNama() {
      const nama = document.getElementById("namaInput").value;
      if (nama) {
        localStorage.setItem("nama", nama);
        tampilNama();
      }
    }

    function tampilNama() {
      const nama = localStorage.getItem("nama");
      if (nama) {
        document.getElementById("user").innerText = "Halo, " + nama + " 👋";
      }
    }

    function go(page) {
      window.location.href = page;
    }

    tampilNama();
  </script>

</body>
</html>
